<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed-Mini Bot | Connect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff1744 0%, #c41c3b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .logo {
            font-size: 60px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .status {
            color: #4CAF50;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .qr-section {
            background: #f5f5f5;
            border: 2px dashed #ff1744;
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
        }

        #qrCode {
            background: white;
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
        }

        .input-group {
            margin: 20px 0;
            text-align: left;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #ff1744;
            box-shadow: 0 0 10px rgba(255,23,68,0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff1744, #c41c3b);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,23,68,0.3);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .info {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 12px;
            border-radius: 8px;
            margin: 20px 0;
            color: #1565c0;
            font-size: 14px;
            text-align: left;
        }

        .steps {
            text-align: left;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .step {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        .step-num {
            width: 30px;
            height: 30px;
            background: #ff1744;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .step-text h4 {
            color: #333;
            font-size: 14px;
            margin-bottom: 3px;
        }

        .step-text p {
            color: #666;
            font-size: 12px;
        }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🤖</div>
            <h1>Ahmed-Mini</h1>
            <div class="status">
                <span class="dot"></span>
                <span>Online</span>
            </div>
        </div>

        <div class="info">
            📱 Scan the QR code below to connect your WhatsApp account
        </div>

        <div class="qr-section">
            <div id="qrCode">
                <p style="color: #999;">Generating QR Code...</p>
            </div>
        </div>

        <div class="input-group">
            <label>📞 Your WhatsApp Number</label>
            <input type="tel" id="phoneNumber" placeholder="+923001234567" autocomplete="tel">
        </div>

        <button class="btn" onclick="connect()">✅ Connect Bot</button>
        <button class="btn btn-secondary" onclick="refreshQR()">🔄 Refresh</button>

        <div class="steps">
            <div class="step">
                <div class="step-num">1</div>
                <div class="step-text">
                    <h4>Scan QR Code</h4>
                    <p>Use your phone camera</p>
                </div>
            </div>
            <div class="step">
                <div class="step-num">2</div>
                <div class="step-text">
                    <h4>Enter Your Number</h4>
                    <p>With +92 country code</p>
                </div>
            </div>
            <div class="step">
                <div class="step-num">3</div>
                <div class="step-text">
                    <h4>Connect</h4>
                    <p>Bot goes live!</p>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>© Ahmed-Mini-Bot 2026</p>
            <p style="margin-top: 8px;">Commands: .ping • .alive • .menu</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        window.addEventListener('load', () => {
            generateQR();
        });

        function generateQR() {
            document.getElementById('qrCode').innerHTML = '';
            new QRCode(document.getElementById('qrCode'), {
                text: window.location.href,
                width: 250,
                height: 250,
                colorDark: "#ff1744",
                colorLight: "#ffffff"
            });
        }

        function refreshQR() {
            generateQR();
            alert('QR Refreshed!');
        }

        function connect() {
            const num = document.getElementById('phoneNumber').value.trim();
            if (!num) {
                alert('Enter your number!');
                return;
            }
            alert('Bot connected: ' + num);
            localStorage.setItem('botNumber', num);
        }

        document.getElementById('phoneNumber').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') connect();
        });
    </script>
</body>
</html>
